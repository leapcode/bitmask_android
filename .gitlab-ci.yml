---
stages:
  - docker_image_sdk
  - docker_image_other
  - build
  - test

# When using dind, it's wise to use the overlayfs driver for
# improved performance.
variables:
  DOCKER_DRIVER: overlay

.job_template: &build_docker_image
  image: 0xacab.org:4567/leap/docker/debian:bookworm_amd64
  tags:
    - docker-in-docker
  services:
    - docker:dind

  script:
    - docker --version
    - docker info
    - if ! .gitlab/build.sh ${DOCKER_IMAGE} >> dockerbuild.log 2>&1; then echo "Image build failed. Please check dockerbuild.log."; echo "tail -n 200 dockerbuild.log:"; tail -n 200 dockerbuild.log; echo "disk space:"; df -h; sleep 800; exit 1; fi;
  allow_failure: false
  artifacts:
    expire_in: 3d
    paths:
    - dockerbuild.log

docker_image:sdk:
  stage: docker_image_sdk
  variables:
    DOCKER_IMAGE: android-sdk
  <<: *build_docker_image

docker_image:ndk:
  stage: docker_image_other
  variables:
    DOCKER_IMAGE: android-ndk
  <<: *build_docker_image

docker_image:emulator:
  stage: docker_image_other
  variables:
    DOCKER_IMAGE: android-emulator
  allow_failure: true
  <<: *build_docker_image

docker_image:fastlane:
  stage: docker_image_other
  variables:
    DOCKER_IMAGE: android-fastlane
#    DEFAULT_IMAGE: "registry.0xacab.org/leap/bitmask_android/android-emulator"
  when: manual
  <<: *build_docker_image
  allow_failure: true

unit_test:
  image: "0xacab.org:4567/leap/bitmask_android/android-ndk:latest"
  stage: test
  script:
    - ./scripts/prepareForTests.sh >> prepareForTests.log 2>&1
    - ./gradlew testCustomProductionFatReleaseUnitTest testNormalProductionFatReleaseUnitTest >> unittests.log 2>&1
  artifacts:
    paths:
      - app/build/reports/tests
      - unittests.log
      - prepareForTests.log
    when: on_failure
    expire_in: 3 days

screenshot:
  image: "0xacab.org:4567/leap/bitmask_android/android-fastlane:latest"
  stage: test
  when: manual
  tags:
    - birch
  variables:
    LC_ALL: "en_US.UTF-8"
    LANG: "en_US.UTF-8"
    ANDROID_EMULATOR_USE_SYSTEM_LIBS: 1
    DEBIAN_FRONTEN: "noninteractive"
# try to re-use the build artifcats from before, lib building is slow
  dependencies:
    - build
  script:
    - ./scripts/installFastlane.sh
    - ./scripts/startEmulators.sh
    - ./scripts/fastlane.sh
    - ./scripts/fastlane.sh custom
  artifacts:
    paths:
      - src/customProductionFat/
      - src/normalProductionFat/
    when: always
    expire_in: 3 days
  allow_failure: true

sync-source-strings-to-l10n:
  stage: .pre
  image:
    name: alpine/git
    entrypoint: [""]
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - app/src/main/res/values/strings.xml
  before_script:

  script:
    - git config --global user.name "L10N Bot"
    - git config --global user.email "leap-code-o-matic@leap.se"
    - NEW_BRANCH="source-update-$CI_COMMIT_SHORT_SHA"

    # shallow clone l10n repo
    - git clone --depth 1 -b bitmask https://oauth2:${bitmask_2_l10n}@0xacab.org/leap/l10n.git
    - cd l10n
    
    # make new branch - copy files
    - git checkout -b $NEW_BRANCH
    - mkdir -p android/values
    - cp ../app/src/main/res/values/strings.xml bitmask/
    
    # commit upon changes
    - git add bitmask/strings.xml
    - git commit -m "Update source strings from bitmask_android $CI_COMMIT_SHORT_SHA" || exit 0
    
    # push and mr
    - git push -o merge_request.create -o merge_request.target=bitmask origin $NEW_BRANCH
    
